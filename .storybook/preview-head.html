<!-- Load Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<!-- Load Aural UI JavaScript for interactive components -->
<script src="./javascript/index.js"></script>

<!-- Initialize Aural UI components after page load -->
<script>
  window.addEventListener('DOMContentLoaded', () => {
    if (window.Aural) {
      // Initialize all interactive components globally
      window.Aural.init();
    }
  });

  // Also listen for Storybook story changes
  window.addEventListener('storybook:story-rendered', () => {
    if (window.Aural) {
      window.Aural.init();
    }
  });
</script>

<!-- Load base Aural UI CSS (compiled version with all imports resolved) -->
<link rel="stylesheet" href="./aural-ui.css">

<!-- Detect docs mode and add class to body -->
<script>
  (function() {
    function updateViewMode() {
      const isDocsMode = window.location.href.includes('viewMode=docs') ||
                         document.getElementById('storybook-docs') !== null ||
                         document.querySelector('.sbdocs') !== null;

      if (isDocsMode) {
        document.body.classList.add('docs-mode');
        document.body.classList.remove('story-mode');
      } else {
        document.body.classList.add('story-mode');
        document.body.classList.remove('docs-mode');
      }
    }

    // Run on load
    updateViewMode();

    // Run on URL change (Storybook navigation)
    let lastUrl = location.href;
    new MutationObserver(() => {
      const url = location.href;
      if (url !== lastUrl) {
        lastUrl = url;
        updateViewMode();
      }
    }).observe(document, { subtree: true, childList: true });

    // Also check periodically as a fallback
    setInterval(updateViewMode, 500);
  })();
</script>

<style>
  /* Hide Storybook internal CSS class names and artifacts */
  [class*="css-"]::before,
  [class*="css-"]::after {
    content: none !important;
    display: none !important;
  }

  /* Clean docs display - hide empty Storybook UI elements */
  .sbdocs [class*="css-"]:empty {
    display: none !important;
  }

  /* Hide any visible class name text */
  .sbdocs [class*="css-"] {
    font-size: inherit !important;
  }

  /* Hide theme switcher in docs mode - will be toggled by script */
  body.docs-mode button[title="Theme"],
  body.docs-mode [aria-label*="Theme"] {
    display: none !important;
  }
</style>
