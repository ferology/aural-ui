<base href="/aural-ui/storybook/" />

<!-- Load Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<!-- Load Aural UI JavaScript for interactive components -->
<script src="./index.js"></script>

<!-- Initialize Aural UI components after page load -->
<script>
  window.addEventListener('DOMContentLoaded', () => {
    if (window.Aural) {
      // Initialize all interactive components globally
      window.Aural.init();
    }
  });

  // Also listen for Storybook story changes
  window.addEventListener('storybook:story-rendered', () => {
    if (window.Aural) {
      window.Aural.init();
    }
  });
</script>

<!-- Load base Aural UI CSS (compiled version with all imports resolved) -->
<link rel="stylesheet" href="./aural-ui.css">

<!-- Detect docs mode and add class to body -->
<script>
  (function() {
    function updateViewMode() {
      const isDocsMode = window.location.href.includes('viewMode=docs') ||
                         document.getElementById('storybook-docs') !== null ||
                         document.querySelector('.sbdocs') !== null;

      if (isDocsMode) {
        document.body.classList.add('docs-mode');
        document.body.classList.remove('story-mode');
      } else {
        document.body.classList.add('story-mode');
        document.body.classList.remove('docs-mode');
      }
    }

    // Run on load
    updateViewMode();

    // Run on URL change (Storybook navigation)
    let lastUrl = location.href;
    new MutationObserver(() => {
      const url = location.href;
      if (url !== lastUrl) {
        lastUrl = url;
        updateViewMode();
      }
    }).observe(document, { subtree: true, childList: true });

    // Also check periodically as a fallback
    setInterval(updateViewMode, 500);
  })();
</script>

<script>
  // FORCE light background via JavaScript - override all CSS
  (function forceBackground() {
    function applyBackground() {
      // Get theme colors or use fallback
      const bgColor = getComputedStyle(document.documentElement)
        .getPropertyValue('--color-bg-primary').trim() || '#fafafa';
      const textColor = getComputedStyle(document.documentElement)
        .getPropertyValue('--color-text-primary').trim() || '#0a0a0a';

      // Force background on all problematic elements
      const selectors = [
        'html', 'body', '.sbdocs', '.sbdocs-content', '.sbdocs-wrapper',
        '#storybook-docs', '#docs-root', '.docs-story',
        'div[class*="css-"]', 'div[class^="css-"]'
      ];

      selectors.forEach(selector => {
        document.querySelectorAll(selector).forEach(el => {
          el.style.setProperty('background-color', bgColor, 'important');
          el.style.setProperty('background', bgColor, 'important');
          el.style.setProperty('color', textColor, 'important');
        });
      });

      // Also set on document elements directly
      document.documentElement.style.backgroundColor = bgColor;
      document.body.style.backgroundColor = bgColor;
      document.body.style.color = textColor;
    }

    // Run immediately
    applyBackground();

    // Run on DOM changes
    if (typeof MutationObserver !== 'undefined') {
      const observer = new MutationObserver(applyBackground);
      observer.observe(document.body, { childList: true, subtree: true });
    }

    // Run on theme changes
    document.addEventListener('storybook:story-rendered', applyBackground);
    window.addEventListener('load', applyBackground);

    // Run periodically as fallback
    setInterval(applyBackground, 100);
  })();
</script>

<style>
  /* CRITICAL: Force light background - override Storybook dark mode */
  html,
  html body,
  body,
  body.sb-show-main,
  body.docs-mode,
  #storybook-root,
  #storybook-docs,
  #docs-root,
  .sbdocs,
  .sbdocs.sbdocs-wrapper,
  .sbdocs-content,
  .sbdocs-wrapper,
  .docs-story,
  div[class*="css-"],
  div[class^="css-"] {
    background: var(--color-bg-primary, #fafafa) !important;
    background-color: var(--color-bg-primary, #fafafa) !important;
    color: var(--color-text-primary, #0a0a0a) !important;
  }

  /* Hide Storybook internal CSS class names and artifacts */
  [class*="css-"]::before,
  [class*="css-"]::after {
    content: none !important;
    display: none !important;
  }

  /* Clean docs display - hide empty Storybook UI elements */
  .sbdocs [class*="css-"]:empty {
    display: none !important;
  }

  /* Hide any visible class name text */
  .sbdocs [class*="css-"] {
    font-size: inherit !important;
  }

  /* Hide theme switcher in docs mode - will be toggled by script */
  body.docs-mode button[title="Theme"],
  body.docs-mode [aria-label*="Theme"] {
    display: none !important;
  }

  /* Add right margin to TOC to prevent text cutoff */
  .sbdocs nav[aria-label="Table of Contents"],
  .sbdocs .sidebar-container,
  .sbdocs .sidebar-item {
    padding-right: 16px !important;
    margin-right: 8px !important;
  }
</style>
