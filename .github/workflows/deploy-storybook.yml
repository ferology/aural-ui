name: Deploy Storybook

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run build-storybook
      - name: Deploy to docs/storybook folder
        run: |
          rm -rf docs/storybook
          mkdir -p docs
          cp -r storybook-static docs/storybook
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/storybook
          git commit -m "docs: update Storybook build [skip ci]" || echo "No changes to commit"
          git push --no-verify
